<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">

  <!-- Fundo bordeaux -->
  <rect width="500" height="500" fill="#7B1D2A"/>

  <!-- ══════════════════════════════════════
       ORNAMENTO: DIAMANTE (4 pontas) + cauda curva
       igual ao logo real
       ══════════════════════════════════════ -->

  <!-- Diamante central -->
  <polygon points="250,22 259,38 250,54 241,38" fill="#C9A96E"/>

  <!-- Raios do diamante (linhas finas) -->
  <line x1="250" y1="22" x2="250" y2="14" stroke="#C9A96E" stroke-width="1.2" opacity="0.6"/>
  <line x1="259" y1="38" x2="267" y2="38" stroke="#C9A96E" stroke-width="1.2" opacity="0.6"/>
  <line x1="241" y1="38" x2="233" y2="38" stroke="#C9A96E" stroke-width="1.2" opacity="0.6"/>

  <!-- Cauda/curva descendente do diamante (como no logo real) -->
  <path d="M 250,54 C 248,62 243,70 237,76 C 232,81 227,83 225,87"
        stroke="#C9A96E" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Pequena curva adicional (detalhe do logo) -->
  <path d="M 237,76 C 234,80 233,85 236,88 C 239,91 243,89 244,85"
        stroke="#C9A96E" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ══════════════════════════════════════
       MONOGRAMA MM — alto contraste serif dourado
       M1: x=154–256   M2: x=244–346
       altura: y=108 a y=290
       valley: y=220
       ══════════════════════════════════════ -->

  <!-- ── M1 traços verticais (grossos) ── -->
  <rect x="154" y="108" width="15" height="182" fill="#C9A96E"/>
  <rect x="241" y="108" width="15" height="182" fill="#C9A96E"/>

  <!-- ── M1 diagonais (finos) ── -->
  <polygon points="169,108 173,108 208,220 204,220" fill="#C9A96E"/>
  <polygon points="204,220 208,220 245,108 241,108" fill="#C9A96E"/>

  <!-- ── M2 traços verticais (grossos) ── -->
  <rect x="244" y="108" width="15" height="182" fill="#C9A96E"/>
  <rect x="331" y="108" width="15" height="182" fill="#C9A96E"/>

  <!-- ── M2 diagonais (finos) ── -->
  <polygon points="259,108 263,108 298,220 294,220" fill="#C9A96E"/>
  <polygon points="294,220 298,220 335,108 331,108" fill="#C9A96E"/>

  <!-- ── Serifas topo ── -->
  <rect x="147" y="100" width="29" height="9" fill="#C9A96E"/>
  <rect x="234" y="100" width="29" height="9" fill="#C9A96E"/>
  <rect x="324" y="100" width="29" height="9" fill="#C9A96E"/>

  <!-- ── Serifas base ── -->
  <rect x="147" y="290" width="29" height="9" fill="#C9A96E"/>
  <rect x="234" y="290" width="29" height="9" fill="#C9A96E"/>
  <rect x="324" y="290" width="29" height="9" fill="#C9A96E"/>

  <!-- ── Floritura do M1 (traço descendente elegante) ── -->
  <path d="M 154,290 C 150,304 144,318 138,330 C 132,342 128,350 131,358 C 134,365 141,366 148,360 C 152,356 152,350 148,345"
        stroke="#C9A96E" stroke-width="3.5"
        fill="none" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.85"/>

  <!-- ══════════════════════════════════════
       TEXTO
       ══════════════════════════════════════ -->

  <!-- MYLENA MEIRA -->
  <text x="250" y="338"
    font-family="'Montserrat','Trebuchet MS',Arial,sans-serif"
    font-size="28" font-weight="600" text-anchor="middle"
    fill="#C9A96E" letter-spacing="11">MYLENA MEIRA</text>

  <!-- linha separadora dourada -->
  <line x1="175" y1="350" x2="325" y2="350" stroke="#C9A96E" stroke-width="0.7" opacity="0.4"/>

  <!-- ESPECIALISTA EM ESTRIAS -->
  <text x="250" y="372"
    font-family="'Montserrat','Trebuchet MS',Arial,sans-serif"
    font-size="12.5" font-weight="400" text-anchor="middle"
    fill="#C9A96E" letter-spacing="5.5"
    opacity="0.85">ESPECIALISTA EM ESTRIAS</text>

</svg>
